<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Equipos - Chamoneta Inc</title>
    <link rel="stylesheet" href="/Paginas/main.css">
</head>
<body>

   
    <nav class="navbar">
        <button class="btn-agregar">+ Agregar equipo</button>
 
        <!-- Enlace que activa el popup historial con :target -->
        <a href="#popup-historial" class="nav-title">Historial de Reportes</a>
 
        <!-- Enlace que activa el popup usuario con :target -->
        <a href="#popup-usuario" class="nav-user">
            <div class="nav-avatar" id="nav-iniciales"></div>
            <div class="nav-info">
                <span class="nav-name" id="nav-nombre"></span>
                <span class="nav-role">Admin</span>
            </div>
        </a>
    </nav>
 
    <!--popup de historial de reportes-->
    <div class="popup-overlay" id="popup-historial">
        <a href="#" class="popup-fondo"></a>
        <div class="popup-caja">
            <a href="#" class="popup-cerrar">✕</a>
            <table class="historial-table">
                <thead>
                    <tr>
                        <th>No. Inventario</th>
                        <th>Marca</th>
                        <th>Modelo</th>
                        <th>Procesador</th>
                        <th>Ram</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody>
                    <tr><td>Equipo No.1</td><td>Dell</td><td>Optiplex 7080</td><td>i5-10400</td><td>16GB</td><td>Activo</td></tr>
                    <tr><td>Equipo No.4</td><td>HP</td><td>EliteDesk 800</td><td>i7-9700</td><td>16GB</td><td>Activo</td></tr>
                    <tr><td>Equipo No.6</td><td>Lenovo</td><td>ThinkCentre M720</td><td>i5-9500</td><td>8GB</td><td>Activo</td></tr>
                </tbody>
            </table>
        </div>
    </div>
 
    <!--popup de usuario-->
    <div class="popup-overlay" id="popup-usuario">
        <a href="#" class="popup-fondo"></a>
        <div class="popup-caja popup-caja--usuario">
            <a href="#" class="popup-cerrar">✕</a>
            <div class="popup-user-header">
                <div class="popup-avatar" id="popup-iniciales"></div>
                <div>
                    <p class="popup-user-name" id="popup-nombre"></p>
                    <p class="popup-user-role">Admin</p>
                </div>
            </div>
            <!--cerrar sesion-->
            <a href="/logout" class="btn-cerrar-sesion">Cerrar Sesión</a>
        </div>
    </div>
 
    <!--computadoras-->
     <main class="grid-container" id="gridEquipos">
        
       
    </main>
        <!--Script para poner los datos de el usuario en la pagina --> 
    <script>
        async function cargarUsuario() {
            const respuesta = await fetch('/sesion')
            const datos = await respuesta.json()

            if (datos.usuario) {
                document.getElementById('nav-nombre').textContent = datos.usuario
                document.getElementById('popup-nombre').textContent=datos.usuario

                // Genera las iniciales a partir del nombre
                const iniciales = datos.usuario
                    .split(' ')
                    .map(palabra => palabra[0])
                    .join('')
                    .substring(0, 2)
                    .toUpperCase()

                document.getElementById('nav-iniciales').textContent = iniciales
                document.getElementById('popup-iniciales').textContent = iniciales
            }
        }
        cargarUsuario()
    </script>
    <!--Script principal , Muestra los equipos guardados en la base de datos-->
    <script>
        fetch('/PaginaAdmin/TablaEquipos')
        .then(res => res.json())
        .then(data => {
            const grid = document.getElementById("gridEquipos");
            grid.innerHTML = "";

            data.forEach(equipo => {
                const card = `
                <a href="/PagComputadora?id=${equipo.id_equipos}" class="equipo-card">
                    <div class="equipo-img">
                        <!-- aquí tu SVG -->
                    </div>
                    <div class="equipo-info">
                        <h3>${equipo.nombre_equipo}</h3>
                        <p>${equipo.marca} </p>
                        <p>${equipo.modelo_equipo}</p>
                        <p>${equipo.fecha_adquisicion}</p>
                        <span class="badge ${equipo.estado}">${equipo.estado}</span>
                    </div>
                </a>
                `;
                
                grid.innerHTML += card;
            });
        });
    </script>
</body>
</html>
