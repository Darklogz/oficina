<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Uca Eats!</title>
    <link rel="stylesheet" href="/Paginas/login.css">
</head>
<body>

    <div class="logo-container">
        <h1>Chamoneta INC</h1>
    </div>
 
    <div class="login-container">
        <form action="/login" method="POST">
        <div class="field-group">
            <svg class="field-svg" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
                <circle cx="12" cy="8" r="4"/>
                <path stroke-linecap="round" d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            <div class="field-content">
                <label for="username">ID_Usuario</label>
                <input type="text" id="username" name="username"
                       value="" autocomplete="username" pattern="[a-zA-Z0-9]+" title="Solo letras y números" required/>
            </div>
        </div>
 
        <div class="field-group">
            <svg class="field-svg" xmlns="http://www.w3.org/2000/svg" fill="none"
                 viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.4">
                <rect x="5" y="11" width="14" height="10" rx="2"/>
                <path stroke-linecap="round" d="M8 11V7a4 4 0 0 1 8 0v4"/>
            </svg>
            <div class="field-content">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                       autocomplete="current-password" pattern="[a-zA-Z0-9]+" title="Solo letras y números" required/>
            </div>
        </div>
 
        <button class="btn-entrar" type="submit">Entrar</button>
    </form>
    </div>
    //mensaje de error 
    <script>
        const params = new URLSearchParams(window.location.search)
        const error = params.get('error')
        if (error === 'credenciales') alert('Usuario o contraseña incorrectos')
    </script>
 
</body>
</html>
